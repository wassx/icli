name: Build release binaries

on:
  push:
    tags:
      - "release"
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: icli-linux-amd64
          - os: macos-latest
            artifact: icli-macos-arm64
          - os: macos-latest
            artifact: icli-macos-amd64
            arch: x86_64
          - os: windows-latest
            artifact: icli-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 pyinstaller --onefile --name "${{ matrix.artifact }}" --add-data "icli:icli" --target-arch x86_64 main.py
          else
            pyinstaller --onefile --name "${{ matrix.artifact }}" --add-data "icli:icli" main.py
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Find the previous tag (exclude current)
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "## What's Changed"
            echo ""

            # Group commits by conventional-commit prefix
            for prefix_label in "feat:Features" "fix:Bug Fixes" "docs:Documentation" "ci:CI/CD" "refactor:Refactoring" "perf:Performance" "test:Tests"; do
              prefix="${prefix_label%%:*}"
              label="${prefix_label##*:}"
              items=$(git log "$RANGE" --pretty=format:"- %s" --grep="^${prefix}" 2>/dev/null || true)
              if [ -n "$items" ]; then
                echo "### ${label}"
                echo "$items"
                echo ""
              fi
            done

            # Uncategorised commits (no conventional prefix)
            other=$(git log "$RANGE" --pretty=format:"%s" \
              | grep -v -E "^(feat|fix|docs|ci|refactor|perf|test)" || true)
            if [ -n "$other" ]; then
              echo "### Other"
              echo "$other" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...${CURRENT_TAG}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/*
